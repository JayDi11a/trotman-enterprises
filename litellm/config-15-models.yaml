# Router configuration
router_settings:
  routing_strategy: simple-shuffle
  model_group_alias:
    function-calling-small: [hermes-2-pro-8b, qwen2.5-14b, granite-3.0-8b]
    function-calling-medium: [qwen2.5-32b, mixtral-8x7b]
    function-calling-large: [llama-3.1-70b, qwen2.5-72b, mixtral-8x22b]
    cloud-premium: [claude-3-5-sonnet, gpt-4o]
    cloud-efficient: [claude-3-5-haiku, gpt-4o-mini, gemini-2.0-flash]
  num_retries: 2
  timeout: 600
  allowed_fails: 3
  cooldown_time: 60

# General settings
litellm_settings:
  drop_params: true
  set_verbose: false
  json_logs: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL  # Optional: For usage tracking
